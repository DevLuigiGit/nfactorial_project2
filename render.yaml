services:
  - type: web
    name: jobboard-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run seed
    startCommand: node -e "require('tsx/cjs'); require('./src/index.ts')"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobboard-db
          property: connectionString
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production

databases:
  - name: jobboard-db
    plan: free
